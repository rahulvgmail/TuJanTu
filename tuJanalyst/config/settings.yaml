# Non-secret application settings
# Secrets go in .env — this file is for tunable parameters.

pipeline:
  gate_confidence_threshold: 0.5   # Minimum confidence to pass gate
  max_concurrent_analyses: 3       # Limit parallel Layer 3 runs
  past_investigation_lookback_days: 90  # How far back to pull past investigations

rss:
  feeds:
    - name: "NSE Corporate Announcements"
      url: "https://nsearchives.nseindia.com/content/RSS/Online_announcements.xml"
      poll_interval_seconds: 300
    - name: "BSE Corporate Announcements"
      url: "https://www.bseindia.com/data/xml/announcements.xml"
      poll_interval_seconds: 300

symbol_resolution:
  seed_path: "config/public_sector_banks_seed.yaml"
  nse_source_url: null
  bse_source_url: null
  refresh_enabled: false
  refresh_interval_hours: 24
  enable_web_fallback: true
  enable_dspy_fallback: false
  fuzzy_threshold: 0.92
  review_threshold: 0.90

reports:
  max_report_length_words: 2000
  include_raw_sources: true
